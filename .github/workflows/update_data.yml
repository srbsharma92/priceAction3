name: Update Screener Data

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false
  
jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt   # keep whatever you already use

      # ---- UNCHANGED: your existing scraper step ----
      - name: Run screener job
        run: python screener_job.py

      # ---- NEW: replaces "commit live_data.xlsx back to repo" ----
      - name: Publish data to Cloudflare KV
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: python publish_to_cloudflare_kv.py
